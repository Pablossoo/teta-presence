<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teta Presence Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #f5f7fa;
      color: #1a1a2e;
    }

    header {
      background: #1a73e8;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .title { font-size: 16px; font-weight: 600; }
    header .subtitle { font-size: 11px; opacity: 0.85; margin-top: 2px; }

    .card {
      background: white;
      margin: 12px;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-success  { background: #34a853; }
    .dot-error    { background: #ea4335; }
    .dot-running  { background: #fbbc04; animation: pulse 1s infinite; }
    .dot-skipped  { background: #9aa0a6; }
    .dot-idle     { background: #9aa0a6; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-label { font-weight: 600; font-size: 15px; }
    .status-detail { font-size: 12px; color: #5f6368; margin-top: 4px; }
    .status-time   { font-size: 11px; color: #9aa0a6; margin-top: 2px; }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #1a73e8; color: white; }
    .btn-reset { background: #f1f3f4; color: #5f6368; border: 1px solid #dadce0; }

    .log-section { margin: 0 12px 12px; }
    .log-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #9aa0a6;
      margin-bottom: 6px;
    }
    .log-list {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      max-height: 160px;
      overflow-y: auto;
    }
    .log-entry {
      padding: 7px 12px;
      font-size: 12px;
      border-bottom: 1px solid #f1f3f4;
      display: flex;
      gap: 8px;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-time  { color: #9aa0a6; flex-shrink: 0; }
    .log-msg   { flex: 1; }
    .log-error { color: #ea4335; }
    .log-success { color: #34a853; }

    .empty { color: #9aa0a6; font-size: 12px; text-align: center; padding: 12px; }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="title">🤖 Teta Presence Bot</div>
      <div class="subtitle">Automatyczne potwierdzenie obecności</div>
    </div>
  </header>

  <div class="card">
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div>
        <div class="status-label" id="statusLabel">Ładowanie...</div>
        <div class="status-detail" id="statusDetail"></div>
        <div class="status-time" id="statusTime"></div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top: 0;">
    <button class="btn btn-primary" id="runNowBtn">▶ Uruchom teraz</button>
    <button class="btn btn-reset" id="resetBtn" style="margin-top:8px;">🗑️ Resetuj dane (test)</button>
  </div>

  <div class="log-section">
    <div class="log-title">Ostatnie zdarzenia</div>
    <div class="log-list" id="logList">
      <div class="empty">Brak wpisów</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
